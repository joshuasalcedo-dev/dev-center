# Load .env file (optional, won't fail if missing)
spring.config.import=optional:file:.env[.properties]

server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/command_center
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway disabled for dev — Hibernate manages schema
spring.flyway.enabled=false

# Cache (local)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Google OAuth2 (use test/dev credentials)
spring.security.oauth2.client.registration.google.client-id=${DDD_GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${DDD_GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Admin
app.admin.emails=${ADMIN_EMAILS:}

# CI/CD
app.cicd.local-artifact-id=${LOCAL_ARTIFACT_ID:}
app.cicd.desktop-artifact-id=${DESKTOP_ARTIFACT_ID:}

# Base URL
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:3000
