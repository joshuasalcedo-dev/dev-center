name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

env:
  R2_BUCKET: dev-center-releases

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: WINDOWS_X64
            args: '--target x86_64-pc-windows-msvc'
          - os: windows-latest
            platform: WINDOWS_ARM64
            args: '--target aarch64-pc-windows-msvc'
          - os: ubuntu-22.04
            platform: LINUX_X64_DEB
            args: ''
          - os: ubuntu-22.04-arm
            platform: LINUX_ARM64_DEB
            args: ''
          - os: macos-13
            platform: MACOS_X64
            args: '--target x86_64-apple-darwin'
          - os: macos-latest
            platform: MACOS_ARM64
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64-pc-windows') && 'aarch64-pc-windows-msvc' || contains(matrix.args, 'x86_64-apple') && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'Desktop v${{ inputs.version }}'
          releaseBody: 'Desktop app release v${{ inputs.version }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Find built artifacts
        id: artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "WINDOWS_X64" ] || [ "${{ matrix.platform }}" = "WINDOWS_ARM64" ]; then
            INSTALLER=$(find src-tauri/target -name "*.nsis.zip" 2>/dev/null | head -1)
            if [ -z "$INSTALLER" ]; then
              INSTALLER=$(find src-tauri/target -name "*.msi" 2>/dev/null | head -1)
            fi
            SIG="${INSTALLER}.sig"
          elif [ "${{ matrix.platform }}" = "LINUX_X64_DEB" ] || [ "${{ matrix.platform }}" = "LINUX_ARM64_DEB" ]; then
            INSTALLER=$(find src-tauri/target -name "*.AppImage" 2>/dev/null | head -1)
            SIG="${INSTALLER}.sig"
          else
            INSTALLER=$(find src-tauri/target -name "*.app.tar.gz" 2>/dev/null | head -1)
            SIG="${INSTALLER}.sig"
          fi

          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          FILENAME=$(basename "$INSTALLER")
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

          HASH=$(sha256sum "$INSTALLER" | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

          if [ "$RUNNER_OS" = "macOS" ]; then
            SIZE=$(stat -f%z "$INSTALLER")
          else
            SIZE=$(stat -c%s "$INSTALLER")
          fi
          echo "size=$SIZE" >> $GITHUB_OUTPUT

          if [ -f "$SIG" ]; then
            echo "signature=$(cat "$SIG")" >> $GITHUB_OUTPUT
          else
            echo "signature=" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put ${{ env.R2_BUCKET }}/desktop/v${{ inputs.version }}/${{ steps.artifacts.outputs.filename }} --file=${{ steps.artifacts.outputs.installer }}

      - name: Save release info
        shell: bash
        run: |
          cat > release-info.json <<EOF
          {
            "platform": "${{ matrix.platform }}",
            "downloadUrl": "${{ secrets.CLOUDFLARE_R2_PUBLIC_URL }}/desktop/v${{ inputs.version }}/${{ steps.artifacts.outputs.filename }}",
            "hashAlgorithm": "SHA256",
            "hashValue": "${{ steps.artifacts.outputs.hash }}",
            "sizeBytes": ${{ steps.artifacts.outputs.size }},
            "signature": "${{ steps.artifacts.outputs.signature }}"
          }
          EOF

      - name: Upload release info
        uses: actions/upload-artifact@v4
        with:
          name: release-info-${{ matrix.platform }}
          path: release-info.json

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download all release info
        uses: actions/download-artifact@v4
        with:
          pattern: release-info-*
          merge-multiple: false

      - name: Publish release to remote server
        shell: bash
        run: |
          BINARIES="["
          FIRST=true
          for f in release-info-*/release-info.json; do
            if [ "$FIRST" = false ]; then BINARIES+=","; fi
            BINARIES+=$(cat "$f")
            FIRST=false
          done
          BINARIES+="]"

          curl -X POST "${{ secrets.REMOTE_SERVER_URL }}/api/admin/artifacts/${{ secrets.DESKTOP_ARTIFACT_ID }}/releases" \
            -H "X-API-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\": \"${{ inputs.version }}\", \"binaries\": $BINARIES}"
