server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:commandcenter-test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Cache (local)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Admin
app.admin.emails=${ADMIN_EMAILS:}

# CI/CD
app.cicd.local-artifact-id=${LOCAL_ARTIFACT_ID:}
app.cicd.desktop-artifact-id=${DESKTOP_ARTIFACT_ID:}

# Base URL
app.base-url=https://test.devscentral.com
