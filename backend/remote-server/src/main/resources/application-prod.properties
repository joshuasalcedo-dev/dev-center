server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Redis cache
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}

# Elasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_URIS}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Admin
app.admin.emails=${ADMIN_EMAILS}

# CI/CD
app.cicd.local-artifact-id=${LOCAL_ARTIFACT_ID}
app.cicd.desktop-artifact-id=${DESKTOP_ARTIFACT_ID}

# Base URL
app.base-url=https://api.devscentral.com
app.frontend-url=${FRONTEND_URL:https://devscentral.com}
